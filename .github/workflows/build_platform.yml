name: Build Chunker for a specific platform

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: "Build and Test Linux"
        required: false
        default: true
        type: boolean
      build_windows:
        description: "Build Windows"
        required: false
        default: true
        type: boolean
      build_mac:
        description: "Build Mac"
        required: false
        default: true
        type: boolean
jobs:
  build_test_linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            gradle-args: 'build'
          - os: ubuntu-24.04-arm
            gradle-args: 'build -x test'
    runs-on: ${{ matrix.os }}
    if: github.event.inputs.build_linux == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v4

      - name: Mark Gradle as Executable
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew ${{ matrix.gradle-args }}

      - name: Upload CLI Jar
        uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest'
        with:
          name: jar-builds
          path: build/libs/*.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-builds-${{ matrix.os }}
          path: build/libs/linux/

  build_windows:
    strategy:
      matrix:
        include:
          - os: windows-latest
            java-version: '17'
            unpacked-dir: win-unpacked
          - os: windows-11-arm
            java-version: '21'
            unpacked-dir: win-arm64-unpacked
    runs-on: ${{ matrix.os }}
    if: github.event.inputs.build_windows == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v4

      - name: Build with Gradle Wrapper
        run: ./gradlew build -x test

      - name: Sign exe with Trusted Signing
        uses: azure/trusted-signing-action@v1.2.0
        if: github.repository == 'HiveGamesOSS/Chunker'
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://weu.codesigning.azure.net/
          trusted-signing-account-name: hivegames
          certificate-profile-name: Chunker
          files-folder: build/libs/windows/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign unpacked with Trusted Signing
        uses: azure/trusted-signing-action@v1.2.0
        if: github.repository == 'HiveGamesOSS/Chunker'
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://weu.codesigning.azure.net/
          trusted-signing-account-name: hivegames
          certificate-profile-name: Chunker
          files-folder: build/libs/windows/${{ matrix.unpacked-dir }}/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-builds-${{ matrix.os }}
          path: build/libs/windows/

  build_mac:
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    if: github.event.inputs.build_mac == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v4

      - name: Mark Gradle as Executable
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew build -x test

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-builds-${{ matrix.os }}
          path: build/libs/mac/