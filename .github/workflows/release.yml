name: Publish Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        type: string
      publish_maven:
        description: 'Publish to Maven (GitHub Packages)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  build_test_linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            gradle-args: 'build'
          - os: ubuntu-24.04-arm
            gradle-args: 'build -x test'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v4

      - name: Mark Gradle as Executable
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew ${{ matrix.gradle-args }}

      - name: Publish to GitHub packages
        if: matrix.os == 'ubuntu-latest' && github.event.inputs.publish_maven == 'true'
        run: ./gradlew publish
        env:
          MAVEN_DEPLOY_URL: "https://maven.pkg.github.com/${{github.repository}}"
          MAVEN_DEPLOY_USERNAME: ${{ github.actor }}
          MAVEN_DEPLOY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CLI Jar
        uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest'
        with:
          name: jar-builds
          path: build/libs/*.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-builds-${{ matrix.os }}
          path: build/libs/linux/

  build_windows:
    strategy:
      matrix:
        include:
          - os: windows-latest
            java-version: '17'
            unpacked-dir: win-unpacked
          - os: windows-11-arm
            java-version: '21'
            unpacked-dir: win-arm64-unpacked
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v4

      - name: Build with Gradle Wrapper
        run: ./gradlew build -x test

      - name: Sign exe with Trusted Signing
        uses: azure/trusted-signing-action@v1.2.0
        if: github.repository == 'HiveGamesOSS/Chunker'
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://weu.codesigning.azure.net/
          trusted-signing-account-name: hivegames
          certificate-profile-name: Chunker
          files-folder: build/libs/windows/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign unpacked with Trusted Signing
        uses: azure/trusted-signing-action@v1.2.0
        if: github.repository == 'HiveGamesOSS/Chunker'
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://weu.codesigning.azure.net/
          trusted-signing-account-name: hivegames
          certificate-profile-name: Chunker
          files-folder: build/libs/windows/${{ matrix.unpacked-dir }}/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-builds-${{ matrix.os }}
          path: build/libs/windows/

  build_mac:
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v4

      - name: Mark Gradle as Executable
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew build -x test

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-builds-${{ matrix.os }}
          path: build/libs/mac/

  publish:
    runs-on: ubuntu-latest
    needs: [ build_test_linux, build_windows, build_mac ]

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v8
        with:
          name: jar-builds
          path: artifacts

      # === Linux amd64 ===

      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-builds-ubuntu-latest
          path: artifacts

      - name: Compress Linux CLI (amd64)
        run: |
          cd artifacts && zip -r "chunker-cli-linux-amd64.zip" "chunker-cli" && cd ..
          rm -rf "artifacts/chunker-cli"

      - name: Compress Linux Unpacked (amd64)
        run: |
          version="${{ github.event.inputs.version }}"
          cd artifacts/linux-unpacked && zip -r "../Chunker-$version-amd64-linux.zip" . && cd ../..
          rm -rf "artifacts/linux-unpacked"

      - name: Rename AppImage files (amd64)
        run: |
          for file in artifacts/*.AppImage; do
            mv "$file" "${file%.AppImage}-amd64-linux.AppImage"
          done

      - name: Rename deb files (amd64)
        run: |
          for file in artifacts/chunker-electron_*.deb; do
            new_file="${file//chunker-electron_/Chunker-}"
            new_file="${new_file//_/-}"
            mv "$file" "${new_file%.deb}-linux.deb"
          done

      # === Linux arm64 ===

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-builds-ubuntu-24.04-arm
          path: artifacts

      - name: Compress Linux CLI (arm64)
        run: |
          cd artifacts && zip -r "chunker-cli-linux-arm64.zip" "chunker-cli" && cd ..
          rm -rf "artifacts/chunker-cli"

      - name: Compress Linux Unpacked (arm64)
        run: |
          version="${{ github.event.inputs.version }}"
          cd artifacts/linux-arm64-unpacked && zip -r "../Chunker-$version-arm64-linux.zip" . && cd ../..
          rm -rf "artifacts/linux-arm64-unpacked"

      - name: Rename AppImage files (arm64)
        run: |
          for file in artifacts/*.AppImage; do
            [[ "$file" == *-linux.AppImage ]] && continue
            base="${file%.AppImage}"
            base="${base%-arm64}"
            mv "$file" "${base}-arm64-linux.AppImage"
          done

      - name: Rename deb files (arm64)
        run: |
          for file in artifacts/chunker-electron_*.deb; do
            new_file="${file//chunker-electron_/Chunker-}"
            new_file="${new_file//_/-}"
            mv "$file" "${new_file%.deb}-linux.deb"
          done

      # === Windows x86 (amd64) ===

      - name: Download Windows x86 artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-builds-windows-latest
          path: artifacts

      - name: Compress Windows CLI (x86)
        run: |
          cd artifacts && zip -r "chunker-cli-windows-x86.zip" "chunker-cli" && cd ..
          rm -rf "artifacts/chunker-cli"

      - name: Compress Windows Unpacked (x86)
        run: |
          version="${{ github.event.inputs.version }}"
          cd artifacts/win-unpacked && zip -r "../Chunker-$version-windows-x86.zip" . && cd ../..
          rm -rf "artifacts/win-unpacked"

      - name: Rename exe files (x86)
        run: |
          for file in artifacts/*.exe; do
            base_name="${file#artifacts/Chunker }"
            base_name="${base_name%.exe}"
            mv "$file" "artifacts/Chunker-${base_name}-windows-x86.exe"
          done

      # === Windows arm64 ===

      - name: Download Windows arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-builds-windows-11-arm
          path: artifacts

      - name: Compress Windows CLI (arm64)
        run: |
          cd artifacts && zip -r "chunker-cli-windows-arm64.zip" "chunker-cli" && cd ..
          rm -rf "artifacts/chunker-cli"

      - name: Compress Windows Unpacked (arm64)
        run: |
          version="${{ github.event.inputs.version }}"
          cd artifacts/win-arm64-unpacked && zip -r "../Chunker-$version-windows-arm64.zip" . && cd ../..
          rm -rf "artifacts/win-arm64-unpacked"

      - name: Rename exe files (arm64)
        run: |
          for file in artifacts/*.exe; do
            [[ "$file" == *-windows-*.exe ]] && continue
            base_name="${file#artifacts/Chunker }"
            base_name="${base_name%.exe}"
            mv "$file" "artifacts/Chunker-${base_name}-windows-arm64.exe"
          done

      # === Mac ===

      - name: Download Mac artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-builds-macos-latest
          path: artifacts

      - name: Compress Mac CLI
        run: |
          cd artifacts && zip -r "chunker-cli-mac-arm64.app.zip" "chunker-cli.app" && cd ..
          rm -rf "artifacts/chunker-cli.app"

      - name: Download Mac artifact (legacy)
        uses: actions/download-artifact@v8
        with:
          name: macos-builds-macos-15-intel
          path: artifacts

      - name: Compress Mac CLI (legacy)
        run: |
          cd artifacts && zip -r "chunker-cli-mac-amd64.app.zip" "chunker-cli.app" && cd ..
          rm -rf "artifacts/chunker-cli.app"

      - name: Rename Mac artifacts (legacy)
        run: |
          find artifacts -type f -name "Chunker-*" ! -name "*-amd64*" ! -name "*arm64*" ! -name "*x86*" -exec bash -c '
            for file; do
              new_name=$(echo "$file" | sed -E "s/(Chunker-[^-]+)(.*)(\.[a-zA-Z0-9]+)$/\1-amd64\2\3/");
              mv "$file" "$new_name";
            done
          ' _ {} +

      - name: Remove blockmap files
        run: |
          rm -rf artifacts/*.blockmap

      - name: Rename dmg files
        run: |
          for file in artifacts/*.dmg; do
            mv "$file" "${file%.dmg}-mac.dmg"
          done

      - name: Create Draft Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ github.event.inputs.version }}"
          gh release create --draft "$tag" --title "$tag" --notes "TODO"

      - name: Upload Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for file in artifacts/*; do
            gh release upload ${{ github.event.inputs.version }} "$file"
          done